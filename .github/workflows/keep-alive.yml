name: Supabase Keep Alive Cron

on:
  schedule:
    # Runs at 00:00 UTC every day to keep Supabase project active
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database Endpoint
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "SUPABASE_URL secret is not set, skipping ping."
            exit 0
          fi
          echo "Pinging Supabase REST API..."
          curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/"
          echo "Supabase keep-alive ping complete."
