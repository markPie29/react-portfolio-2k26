name: Supabase Keep Alive Cron

on:
  schedule:
    # Runs at 00:00 UTC every day to keep Supabase project active
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database Endpoint
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "SUPABASE_URL secret is not set, skipping ping."
            exit 0
          fi

          # Clean inputs to strip any accidental whitespace, quotes, or trailing slashes
          CLEAN_URL=$(echo "${{ secrets.SUPABASE_URL }}" | tr -d ' "' | sed 's#/*$##')
          CLEAN_KEY=$(echo "${{ secrets.SUPABASE_ANON_KEY }}" | tr -d ' "')

          FULL_ENDPOINT="${CLEAN_URL}/rest/v1/inquiries?select=id&limit=1"

          echo "Pinging Supabase REST API at: ${FULL_ENDPOINT}"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${CLEAN_KEY}" \
            -H "Authorization: Bearer ${CLEAN_KEY}" \
            "${FULL_ENDPOINT}")

          echo "Response HTTP Status Code: ${HTTP_CODE}"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✅ Supabase keep-alive ping successful!"
            exit 0
          else
            echo "❌ Supabase ping returned status code: ${HTTP_CODE}"
            exit 1
          fi

